name: Auto-Bump Version

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'OmniGet.ps1'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Version in Script
        shell: pwsh
        run: |
          $file = "OmniGet.ps1"
          $content = Get-Content $file -Raw
          # Use GitHub Run Number as the patch version to guarantee uniqueness and sequential increments
          $newVersion = "v1.0.${{ github.run_number }}"
          $updated = $content -replace '\$OmniGetVersion = "v[0-9]+\.[0-9]+\.[0-9]+"', "`$OmniGetVersion = `"$newVersion`""
          Set-Content -Path $file -Value $updated -NoNewline
          Write-Output "Bumped version to $newVersion"

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Auto-bump version to v1.0.${{ github.run_number }} [skip ci]"
          file_pattern: 'OmniGet.ps1'
