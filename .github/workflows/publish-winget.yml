name: Publish to WinGet

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-winget:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Clean Wrapper and Create Portable Zip
        shell: pwsh
        run: |
          # Create a minimal C# wrapper to launch the PowerShell script.
          # This replaces ps2exe and inherently avoids the Sprisky.U!cl false positive,
          # while still satisfying WinGet's requirement for an .exe RelativeFilePath.
          $code = @"
          using System;
          using System.Diagnostics;
          using System.IO;
          class Program {
              static int Main(string[] args) {
                  string scriptDir = AppDomain.CurrentDomain.BaseDirectory;
                  string ps1Path = Path.Combine(scriptDir, "OmniGet.ps1");
                  var psi = new ProcessStartInfo {
                      FileName = "powershell.exe",
                      Arguments = "-NoProfile -ExecutionPolicy Bypass -File \"\"" + ps1Path + "\"\" " + string.Join(" ", args),
                      UseShellExecute = false
                  };
                  var p = Process.Start(psi);
                  p.WaitForExit();
                  return p.ExitCode;
              }
          }
          "@
          Set-Content -Path "wrapper.cs" -Value $code
          & "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe" /nologo /target:exe /out:omniget.exe wrapper.cs
          
          Compress-Archive -Path omniget.exe, OmniGet.ps1 -DestinationPath omniget.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} omniget.zip --clobber

      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Nexus.OmniGet
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
