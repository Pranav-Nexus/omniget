name: Publish to WinGet

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-winget:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile Portable Executable
        shell: pwsh
        run: |
          ./build.ps1
          Compress-Archive -Path omniget.exe -DestinationPath omniget.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} omniget.zip --clobber

      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Nexus.OmniGet
          installers-regex: '\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
