name: Publish to WinGet

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish-winget:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Portable Zip
        shell: pwsh
        run: |
          # Package the raw script + cmd shim directly — no compilation needed.
          # ps2exe-compiled EXEs are flagged by Defender (Trojan:Win32/Sprisky.U!cl)
          # because the generic ps2exe stub binary matches a heuristic malware pattern.
          # A plain .ps1 + .cmd shim zip is transparent, signable, and Defender-safe.
          Compress-Archive -Path OmniGet.ps1, omniget.cmd -DestinationPath omniget.zip

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} omniget.zip

      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Nexus.OmniGet
          installers-regex: '\.zip$'
          nested-installer-type: portable
          nested-installer-files: |
            [
              {
                "RelativeFilePath": "omniget.cmd",
                "PortableCommandAlias": "omniget"
              }
            ]
          token: ${{ secrets.WINGET_TOKEN }}
